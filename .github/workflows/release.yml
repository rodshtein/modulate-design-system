name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract version from release tag
        id: version
        # tag_name is e.g. "v1.1.0" → strip the "v"
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        run: npm version ${{ steps.version.outputs.value }} --no-git-tag-version

      - name: Install dependencies
        run: npm install

      - name: Build tokens
        run: node scripts/build-tokens.js

      - name: Commit dist and package.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ package.json
          git commit -m "chore: release v${{ steps.version.outputs.value }}"
          git push origin main
