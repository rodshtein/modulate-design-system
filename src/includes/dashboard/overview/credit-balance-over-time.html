<div class="stat-card" data-component="credit-balance-over-time">
  <p class="stat-card__label">Credit Balance Over Time</p>
  <fieldset class="m__segmented-control" data-chart="credit-balance">
    <label
      ><input type="radio" name="credit-period" value="7d" checked />Last 7
      days</label
    >
    <label
      ><input type="radio" name="credit-period" value="30d" />1 month</label
    >
  </fieldset>
  <div class="chart-container">
    <canvas id="credit-balance-chart"></canvas>
    <p class="chart-empty" hidden>No credit history data for this period.</p>
  </div>
</div>
