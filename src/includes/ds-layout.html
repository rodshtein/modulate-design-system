<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ pageTitle if pageTitle else 'Modulate Design' }}</title>
    <meta
      name="description"
      content="{{ pageDesc if pageDesc else 'Modulate UI library' }}" />
    <meta property="og:image" content="/assets/IMG_7135.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="shortcut icon" href="/assets/favicon.png" />

    <link rel="stylesheet" href="/bundle.css" />
  </head>
  <body
    class="ids m__text-content"
    data-theme-storage-key="design-system-theme">
    {% include 'assets/svg-icons-sprite.html' %}
    <script>
      (function () {
        var key = document.body.dataset.themeStorageKey;
        var theme = localStorage.getItem(key);
        if (theme !== "light") {
          document.body.classList.add("dark-mode");
        }
      })();
    </script>
    <button
      type="button"
      class="theme-toggle ds-theme-toggle"
      role="switch"
      aria-checked="true"
      aria-label="Dark theme">
      <span class="theme-toggle__track">
        <span class="theme-toggle__thumb"></span>
      </span>
    </button>
    {% include 'ds-header.html' %} {% block content %}{% endblock %} {% include
    'ds-footer.html' %}

    <script src="/assets/js/theme-toggle.js"></script>
    <script src="/assets/js/lib/photoswipe.umd.min.js"></script>
    <script src="/assets/js/lib/photoswipe-lightbox.umd.min.js"></script>
    <script type="module" src="/assets/js/main.js"></script>
    <script src="/assets/js/color-palette.js"></script>
  </body>
</html>
