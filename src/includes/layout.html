<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ pageTitle if pageTitle else 'Prototype' }}</title>
    <meta
      name="description"
      content="{{ pageDesc if pageDesc else 'Modulate UI library' }}" />
    <link rel="shortcut icon" href="/assets/favicon-product.png" />

    <link rel="stylesheet" href="/bundle.css" />
  </head>
  <body class="ids" data-theme-storage-key="prototype-theme">
    {% include 'assets/svg-icons-sprite.html' %}
    <script>
      (function () {
        var key = document.body.dataset.themeStorageKey;
        var theme = localStorage.getItem(key);
        if (theme !== "light") {
          document.body.classList.add("dark-mode");
        }
      })();
    </script>
    {% include 'header.html' %} {% block content %}{% endblock %} {% include
    'footer.html' %}
    <script src="/assets/js/theme-toggle.js"></script>
    <script src="/assets/js/header-menu.js"></script>
    {% if chartJs %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/assets/js/dashboard-charts.js"></script>
    {% endif %}
  </body>
</html>
