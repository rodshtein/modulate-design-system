<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ pageTitle if pageTitle else 'Prototype' }}</title>
    <meta
      name="description"
      content="{{ pageDesc if pageDesc else 'Modulate UI library' }}" />
    <link rel="shortcut icon" href="/assets/favicon-product.png" />

    <link rel="stylesheet" href="/bundle.css" />
  </head>
  <body class="ids">
    <script>
      (function () {
        var theme = localStorage.getItem('prototype-theme');
        if (theme !== 'light') {
          document.body.classList.add('dark-mode');
        }
      })();
    </script>
    {% include 'header.html' %}
    {% block content %}{% endblock %}
    <script src="/assets/js/theme-toggle.js"></script>
  </body>
</html>
