---
pageTitle: Reset password
permalink: /auth/reset-password/
---

{% extends 'auth-layout.html' %} {% block content %}

<form class="auth-form" action="#" method="post" novalidate>
  <h1>Reset password</h1>

  <div class="m__textfield">
    <label for="reset-email">Email</label>
    <input type="email" id="reset-email" name="email" autocomplete="email" />
  </div>

  <div class="auth-form__actions">
    <button type="submit" class="m__button">Send reset link</button>
  </div>

  <div class="auth-form__links m__text-content">
    <a href="/auth/login/">Back to sign in</a>
  </div>
</form>

{% endblock %}
