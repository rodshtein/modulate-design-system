---
pageTitle: Sign in
permalink: /auth/login/
---

{% extends 'auth-layout.html' %} {% block content %}

<form class="auth-form" action="#" method="post" novalidate>
  <h1>Sign in</h1>

  <div class="m__textfield">
    <label for="login-email">Email</label>
    <input type="email" id="login-email" name="email" autocomplete="email" />
  </div>

  <div class="m__textfield">
    <label for="login-password">Password</label>
    <input
      type="password"
      id="login-password"
      name="password"
      autocomplete="current-password" />
  </div>

  <div class="auth-form__actions">
    <button type="submit" class="m__button">Sign in</button>
  </div>

  <div class="auth-form__links m__text-content">
    <a href="/auth/reset-password/">Forgot password?</a>
    <a href="/auth/signup/">Create account</a>
  </div>
</form>

{% endblock %}
