---
pageTitle: Create account
permalink: /auth/signup/
---

{% extends 'auth-layout.html' %} {% block content %}

<form class="auth-form" action="#" method="post" novalidate>
  <h1>Create account</h1>

  <div class="m__textfield">
    <label for="signup-email">Email</label>
    <input type="email" id="signup-email" name="email" autocomplete="email" />
  </div>

  <div class="auth-form__actions">
    <button type="submit" class="m__button">Continue</button>
  </div>

  <div class="auth-form__links m__text-content">
    <a href="/auth/login/">Already have an account? Sign in</a>
  </div>
</form>

{% endblock %}
